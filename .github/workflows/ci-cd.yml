name: Simple CI/CD Pipeline

on:
  push:
    branches:
      - main # Vérifiez si votre branche s'appelle master ou main

# Permet d'annuler les déploiements en cours si un nouveau push est effectué
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 1. ÉTAPE DE BUILD
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate project structure
        run: |
          echo "Checking files..."
          test -f index.html
          test -f style.css
          test -f app.js
          echo "Build stage completed successfully!"

 # 2. ÉTAPE DE TEST
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

     - name: Basic tests
        run: |
          echo "Running simple tests..."
          grep -q "<html>" index.html
          test -s app.js && echo "✓ app.js exists and has content"
          echo "All tests passed!"

  # 3. ÉTAPE DE PACKAGE
  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          mkdir -p build
          cp index.html build/
          cp style.css build/
          cp app.js build/
          echo "Package created"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  # 4. ÉTAPE DE DÉPLOIEMENT
  deploy:
    needs: package
    runs-on: ubuntu-latest
    
    # Octroyer explicitement les permissions nécessaires pour GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4