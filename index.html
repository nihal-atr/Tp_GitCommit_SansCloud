<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspirational Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="icon">✨</div>
        <h1>Citation du Jour</h1>
        <div class="quote-container">
            <p id="quote">"Cliquez sur le bouton pour générer une dose d'inspiration."</p>
            <span id="author"></span>
        </div>
        <button onclick="showMessage()">Nouvelle Citation</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
